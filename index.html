<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Money Tracker</title>
</head>
<body style="font-family:sans-serif; text-align:center;">

  <h1>💰 Money Tracker</h1>

  <h2 id="income">รายรับ: ...</h2>
  <h2 id="expense">รายจ่าย: ...</h2>
  <h2 id="balance">คงเหลือ: ...</h2>

<script>
const sheetID = "1AbCDefGHIjkLmnoPQRsTuvWXyz1234567890";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

fetch(url)
  .then(res => res.text())
  .then(data => {
    const json = JSON.parse(data.substring(47).slice(0, -2));
    const rows = json.table.rows;

    const income = rows[0].c[1].v;
    const expense = rows[1].c[1].v;
    const balance = income - expense;

    document.getElementById("income").innerText = "รายรับ: " + income;
    document.getElementById("expense").innerText = "รายจ่าย: " + expense;
    document.getElementById("balance").innerText = "คงเหลือ: " + balance;
  });
</script>

</body>
</html>
