<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Money Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="container">

    <h1>💳 Money Dashboard</h1>

    <!-- 💰 cards -->
    <div class="card" id="student">บัตรนักเรียน: ...</div>
    <div class="card" id="truemoney">TrueMoney: ...</div>
    <div class="card" id="cash">เงินสด: ...</div>
    <div class="card balance" id="balance">รวม: ...</div>

    <!-- 📊 chart -->
    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>

    <!-- 🔘 button -->
    <button onclick="openForm()">+ เพิ่มรายการ</button>

    <!-- 🔗 input form link -->
    <input id="formLink" placeholder="https://forms.gle/fGviYtDctusu1PhK6">
    <button onclick="openFormFromInput()">เปิดฟอร์ม</button>

  </div>

  <script src="./script.js"></script>

</body>
</html>
