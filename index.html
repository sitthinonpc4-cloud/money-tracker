<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Money Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: sans-serif; text-align:center; background:#0b1220; color:white; }
    button { margin:5px; padding:10px; }
    canvas { max-width:500px; margin:auto; }
  </style>
</head>

<body>

<h1>💰 Money Dashboard</h1>

<!-- ปุ่มเลือกกราฟ -->
<button onclick="loadChart('daily')">รายวัน</button>
<button onclick="loadChart('weekly')">รายสัปดาห์</button>
<button onclick="loadChart('monthly')">รายเดือน</button>
<button onclick="loadChart('yearly')">รายปี</button>
<button onclick="loadChart('quarter')">ไตรมาส</button>

<br><br>

<!-- กราฟ -->
<canvas id="chart"></canvas>

<br>

<!-- ปุ่มเปิด Google Form -->
<button onclick="openForm()">➕ เพิ่มรายการ</button>

<script src="script.js"></script>

</body>
</html>
